<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <style>
        body {
            background-color: #000; /* Black background */
            color: #fff;           /* White text */
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 20px;
        }
        .link-btn {
            display: block;
            width: 80%;
            max-width: 400px;
            margin: 15px auto;
            padding: 15px;
            background-color: #333; /* Dark grey buttons */
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }
        .link-btn:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <img src="your-image.png" alt="Profile" class="profile-img">
    <h1>Your Name/Brand</h1>
    <p>A short bio about yourself.</p>
    
    <a href="https://twitter.com" class="link-btn">Twitter</a>
    <a href="https://github.com/yourusername" class="link-btn">GitHub</a>
    <a href="https://youtube.com" class="link-btn">YouTube</a>
</body>
</html>
