<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>j0nua's site</title>
    <!-- Premium clean font -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff; /* Clean white */
            color: #111111;           /* Sharp black */
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .content {
            text-align: left; /* Alignment to the left looks "cleaner" and more modern */
            max-width: 300px;
            width: 100%;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 24px;
            font-weight: 300;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .link {
            font-size: 0.9rem;
            color: #111111;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: opacity 0.2s;
            font-weight: 300;
        }

        .link:hover {
            opacity: 0.5; /* Simple fade instead of a box change */
        }

        /* Small dot separator for a design touch */
        .link::before {
            content: "—";
            margin-right: 10px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>j0nua</h1>
        <p>animator</p>

        <nav>
            <a href="https://www.youtube.com/@mango_toot" class="link">YouTube</a>
        </nav>
    </div>

</body>
</html>
